name: Resolve PR Conflicts

# Plain GitHub Actions workflow (NOT gh-aw): runs Anthropic's official Claude Code
# Action authenticated with a Claude Max subscription (CLAUDE_CODE_OAUTH_TOKEN), so the
# model usage is covered by your Max plan — no extra API/Copilot billing.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip push, follow-up PR creation & comment)"
        type: boolean
        default: false
      max_prs:
        description: "Max conflicting PRs to process per run"
        type: string
        default: "10"
      force:
        description: "Force this run even if another is already active (bypass overlap guard)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # claude-code-action fetches a GitHub OIDC token during setup

# No `concurrency` group on purpose. A group with cancel-in-progress:false would QUEUE a
# scheduler tick that arrives mid-run and run it right after — but we want such ticks
# SKIPPED. Overlap is instead prevented by the skip-guard at the top of `discover` below
# (it drops the run when an older run of this workflow is still active, unless `force`
# input is true for an explicit human override). `discover` also skips the (AI) resolve
# job entirely when none of your open PRs are currently conflicting.

jobs:
  # ---- Discover (no AI): skip the run when it would overlap OR there's nothing to do -----
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}   # PAT: read this repo's runs + search your PRs
    outputs:
      has_work: ${{ steps.check.outputs.has_work }}
    steps:
      - name: Skip unless an open PR of yours is currently conflicting
        id: check
        shell: bash
        run: |
          ME=$(gh api user --jq .login)
          if [ -z "$ME" ]; then echo "gh auth failed (empty login)"; exit 1; fi
          echo "Authenticated as: $ME"
          set +e

          # Skip-guard: if another (older) run of THIS workflow is still active, drop this run so
          # scheduler ticks never overlap. Set the `force` input to bypass for human re-runs.
          # Run ids increase monotonically, so we yield only to an OLDER run — if two ever race,
          # exactly one wins.
          if [ "${{ inputs.force }}" != "true" ]; then
            active=$(gh api "/repos/$GITHUB_REPOSITORY/actions/workflows/resolve-conflicts.yml/runs?per_page=100" \
              --jq "[.workflow_runs[] | select(.status != \"completed\") | select(.id < $GITHUB_RUN_ID)] | length" 2>/dev/null)
            if [ "${active:-0}" -gt 0 ]; then
              echo "Another run is already active ($active older run(s)) — skipping this tick."
              echo "has_work=false" >> "$GITHUB_OUTPUT"
              echo "### Resolve PR Conflicts — skipped (another run already active)" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          fi

          # Scope to repos you OWN and have STARRED — same set used by review-prs /
          # address-review / implement-issues. PRs outside this set (e.g. contributions to
          # third-party projects) must never be touched by this workflow.
          stars=$(gh api user/starred --paginate --jq ".[] | select(.owner.login==\"$ME\") | .full_name")
          if [ -z "$stars" ]; then echo "No starred-own repos found — nothing to do."; fi

          # Is at least one of MY open PRs currently CONFLICTING? If not, skip the AI resolve
          # job. Mirrors the resolve step's own filter; UNKNOWN mergeable (GitHub still
          # computing) is treated as not-yet-actionable and retried on the next run.
          count=0
          urls=$(gh search prs --author "@me" --state open "archived:false" --json url --limit 100 --jq '.[].url')
          for url in $urls; do
            R=$(printf '%s' "$url" | sed -n 's#https://github.com/\([^/]*/[^/]*\)/pull/.*#\1#p')
            n=$(printf '%s' "$url" | sed -n 's#.*/pull/\([0-9][0-9]*\).*#\1#p')
            { [ -z "$R" ] || [ -z "$n" ]; } && continue

            # Skip PRs that aren't in a starred-own repo (the scope guard).
            if ! printf '%s\n' "$stars" | grep -qxF "$R"; then
              echo "skip ${R}#${n}: not a starred-own repo"; continue
            fi

            view=$(gh pr view "$n" --repo "$R" --json state,mergeable,headRefName 2>/dev/null)
            [ -z "$view" ] && continue
            [ "$(printf '%s' "$view" | jq -r '.state')" != "OPEN" ] && continue
            [ "$(printf '%s' "$view" | jq -r '.mergeable')" != "CONFLICTING" ] && continue
            head=$(printf '%s' "$view" | jq -r '.headRefName')
            case "$head" in main | master) continue ;; esac
            count=$((count + 1))
            echo "conflicting: ${R}#${n} (${head})"
          done

          echo "Found ${count} conflicting PR(s)."
          if [ "$count" -gt 0 ]; then echo "has_work=true" >> "$GITHUB_OUTPUT"; else echo "has_work=false" >> "$GITHUB_OUTPUT"; fi
          {
            echo "### Resolve PR Conflicts — discovery"
            if [ "$count" -gt 0 ]; then
              echo "Found **${count}** conflicting PR(s) to resolve."
            else
              echo "No conflicting PRs — skipped."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  resolve:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Resolve conflicts with Claude
        uses: anthropics/claude-code-action@v1
        id: claude
        env:
          # PAT with `repo` scope on the target repos (forks included). gh and git read
          # GH_TOKEN directly — no firewall/scrubbing here, and Claude Code (unlike the
          # Copilot CLI) does not reject classic PATs.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          # Claude Max subscription auth (run `claude setup-token` locally to mint it).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Authenticate git/gh with the PAT so the agent can clone/push/PR ACROSS repos.
          # Without this the action uses the claude[bot] app token (this repo only) and
          # cross-repo pushes get "denied to claude[bot] ... 403".
          github_token: ${{ secrets.GH_TOKEN }}
          claude_args: |
            --model sonnet
            --max-turns 80
            --allowedTools Bash,Read,Write,Edit,Glob,Grep
          # `sonnet` is plenty for mechanical merge resolution and is easier on your Max
          # quota; switch to `opus` for maximum quality.
          prompt: |
            You auto-resolve merge conflicts on the repository owner's own open pull
            requests across GitHub. For each conflicting PR, open a *follow-up* PR that
            merges the latest base branch into the PR's head branch with conflicts
            resolved, then comment on the original PR linking to it.

            Run configuration:
            - Dry run: `${{ inputs.dry_run || 'false' }}` — when `true`, do everything
              EXCEPT `git push`, opening the follow-up PR, and commenting.
            - Max PRs to process: `${{ inputs.max_prs || '10' }}` — process at most this
              many conflicting PRs; defer the rest to the next run.

            `gh` and `git` are authenticated via the `GH_TOKEN` environment variable (a
            PAT). Run `gh auth status` first; if it fails, stop and report it.

            ## Step 1 — Find candidate PRs
            1. `ME=$(gh api user --jq .login)` and print it.
            2. Compute ME's starred-own repos (the SAME scope guard used by review-prs /
               address-review / implement-issues):
               `stars=$(gh api user/starred --paginate --jq ".[] | select(.owner.login==\"$ME\") | .full_name")`.
            3. List ME's open PRs across GitHub:
               `gh search prs --author "@me" --state open "archived:false" --json url --limit 100`.
               Parse out each `owner`, `repo`, and `number`.

            ## Step 2 — Filter to processable conflicts
            For each candidate, first SKIP it (printing "not a starred-own repo") unless
            `owner/repo` is present in `stars` — this workflow must act ONLY on your own PRs in
            repos you both own and have starred, never on contributions to third-party projects.
            Then `gh pr view <number> --repo <owner>/<repo> --json author,state,mergeable,headRefName,baseRefName,headRepository,headRepositoryOwner,isCrossRepository,url`
            and SKIP it (printing the reason) unless ALL hold:
            - author login == `ME`; state == `OPEN`;
            - `mergeable` == `CONFLICTING` (if `UNKNOWN`, GitHub is still computing — skip and let the next run retry);
            - head branch is NOT `main`/`master`; the head repository still exists.
            Print how many candidates and how many conflicting; cap at the Max-PRs value and print how many you deferred.

            ## Step 3 — Resolve each PR (treat each independently; on error, log and continue)
            Let `HEAD_OWNER/HEAD_REPO`, `HEAD_BRANCH`, `BASE_BRANCH` be the PR's head repo/branch and base branch.
            1. **Skip if already resolved.** Prefix `autopilot-bot/resolve/<HEAD_BRANCH with / replaced by ->-`.
               `gh pr list --repo HEAD_OWNER/HEAD_REPO --state open --base HEAD_BRANCH --json number,url,headRefName`;
               if an open PR whose head starts with that prefix exists, print it and skip.
            2. **Clone the head branch** into a temp dir INSIDE the workspace (so your
               file-editing tools are allowed to write there): `WORKDIR=$(mktemp -d "$PWD/.resolve-XXXXXX")`
               then `git clone --branch HEAD_BRANCH --single-branch https://x-access-token:$GH_TOKEN@github.com/HEAD_OWNER/HEAD_REPO.git "$WORKDIR"`.
               Run later git commands with `git -C "$WORKDIR"`; `rm -rf "$WORKDIR"` when done with this PR.
            3. **Make the base reachable.** If the PR is cross-fork, add the base repo as remote
               `git -C "$WORKDIR" remote add upstream https://x-access-token:$GH_TOKEN@github.com/<BASE_OWNER>/<BASE_REPO>.git`
               and `git -C "$WORKDIR" fetch upstream BASE_BRANCH:refs/remotes/upstream/BASE_BRANCH` (merge ref `upstream/BASE_BRANCH`);
               otherwise `git -C "$WORKDIR" fetch origin BASE_BRANCH:refs/remotes/origin/BASE_BRANCH` (merge ref `origin/BASE_BRANCH`).
            4. **Prepare the working branch.** `git -C "$WORKDIR" config user.name "autopilot[bot]"`,
               `... config user.email "noreply@github.com"`, `... config core.hooksPath /dev/null`,
               `... config commit.gpgSign false`. Create branch
               `autopilot-bot/resolve/<safe-head>-<UTC YYYYMMDDHHMMSS>` via `git -C "$WORKDIR" checkout -b <branch>`.
            5. **Merge the base.** `git -C "$WORKDIR" merge --no-ff --no-edit <merge ref>`.
               - Clean merge (exit 0) → nothing to resolve; print and skip (no push/PR).
               - Failure → list conflicts `git -C "$WORKDIR" diff --name-only --diff-filter=U`. If empty, the merge
                 failed for another reason: print stderr, `git -C "$WORKDIR" merge --abort`, skip.
            6. **Resolve every conflicted file.** Read each and rewrite it resolved:
               the HEAD side is the PR branch (work in progress), the incoming side is the base (latest upstream).
               Preserve both intentions when compatible; when they genuinely conflict, prefer the PR (HEAD) side.
               Leave NO `<<<<<<<` / `=======` / `>>>>>>>` markers. Verify none remain
               (`grep -nE '^(<{7}|={7}|>{7})' <file>` prints nothing). If any remain, `git -C "$WORKDIR" merge --abort` and skip this PR. `git -C "$WORKDIR" add` each resolved file.
            7. **Commit** with a message summarizing the resolution and listing the resolved files; then `git -C "$WORKDIR" log -1 --stat`.
            8. **Publish.** If Dry run is `true`, print what you would push/open and skip. Otherwise:
               - `git -C "$WORKDIR" push origin <branch>`;
               - `gh pr create --repo HEAD_OWNER/HEAD_REPO --base HEAD_BRANCH --head <branch> --title "fix conflict: <HEAD_BRANCH> ← <BASE_BRANCH> (#<number>)" --body "<body>"`
                 (body: notes it auto-resolves #<number>, lists base + resolved files, says merging it updates the original PR, and to review before merging);
               - `gh pr comment <number> --repo <owner>/<repo> --body "Opened a PR that auto-resolves the merge conflicts: #<new> — <url>. After review, merging it updates this PR."

            ## Step 4 — Summary
            Print a one-line summary: how many PRs succeeded and how many failed. Make any failures explicit.

      # Capture this run's token/cost usage into the usage-ledger branch (best-effort;
      # never fails the job) and raise billing/limit alerts. See .github/actions/record-usage.
      - name: Record Claude usage
        if: always()
        uses: ./.github/actions/record-usage
        with:
          execution_file: ${{ steps.claude.outputs.execution_file }}
          claude_outcome: ${{ steps.claude.outcome }}
          model: sonnet
          gh_token: ${{ secrets.GH_TOKEN }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          alert_channel: ${{ vars.SLACK_ALERT_CHANNEL_ID }}
