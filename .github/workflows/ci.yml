name: CI

# Batches are now plain GitHub Actions workflows (no gh-aw compile step). Lint them so
# obvious YAML / expression mistakes are caught before a run spends Claude Max quota.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color

  flake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: nixbuild/nix-quick-install-action@v35
        with:
          # Quick-install drops a prebuilt Nix in ~seconds (vs the slower daemon
          # install). keep-env-derivations/keep-outputs keep the dev shell's deps in
          # the store so the cache step below can reuse them. (flakes are on by
          # default in this installer; kept explicit for clarity.)
          nix_conf: |
            experimental-features = nix-command flakes
            keep-env-derivations = true
            keep-outputs = true
      # The slow part is re-fetching the dev shell (claude-code, terraform, node …)
      # from the binary cache every run. Cache /nix/store across runs instead; the
      # key is flake.nix/flake.lock, so it only rebuilds when deps actually change.
      - name: Cache the Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never
      - run: nix flake check
      - run: nix develop --command true

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: infra/scheduler
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/scheduler/package-lock.json
      - run: npm ci
      - name: Typecheck + build worker (strict tsc)
        run: npm run build

  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: infra/scheduler
      - run: npm run build
        working-directory: infra/scheduler
      - run: terraform validate
